name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    # Skip when only the api/ subtree changes (it has its own workflow)
    paths-ignore:
      - 'api/**'
      - 'scripts/**'
      - '**/*.md'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one Pages deploy at a time, but let new pushes cancel an
# in-progress run so the latest content always wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the repo root — index.html, audio/, js/, styles/ etc.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
