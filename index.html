<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="description" content="Huroof — Learn Arabic letters and words through fun games for kids" />
  <title>حروف · Huroof</title>

  <!-- Favicon via emoji -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌟</text></svg>" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/animations.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components.css" />

  <!-- Confetti (lightweight, CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    /* Inline splash loader shown before JS boots */
    #splash {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #E0F7FA 0%, #FFF9F0 60%, #FCE4EC 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash .splash-logo {
      font-family: 'Amiri', serif;
      font-size: 4rem;
      color: #00897B;
      animation: bounceIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    #splash .splash-sub {
      font-family: 'Nunito', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      color: #1A237E;
      margin-top: 8px;
    }
    @keyframes bounceIn {
      0%  { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.1); opacity: 1; }
      70% { transform: scale(0.9); }
      100%{ transform: scale(1); }
    }
  </style>
</head>
<body>

  <!-- Splash screen (hides once fonts / JS load) -->
  <div id="splash">
    <div class="splash-logo">حروف</div>
    <div class="splash-sub">Huroof · Letters ✨</div>
  </div>

  <!-- Main app mount point -->
  <div id="app" role="main" aria-live="polite"></div>

  <!-- API base — set to your Function App URL to enable cloud sync. Empty = offline-only. -->
  <script>window.HUROOF_API_BASE = 'https://huroof-api-6813.azurewebsites.net/api';</script>

  <!-- Data & helpers (order matters) -->
  <script src="js/data.js"></script>
  <script src="js/books.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/badges.js"></script>
  <script src="js/router.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/sync.js"></script>

  <!-- Game modules -->
  <script src="js/games/flashcard.js"></script>
  <script src="js/games/multipleChoice.js"></script>
  <script src="js/games/connectColumns.js"></script>
  <script src="js/games/dragDrop.js"></script>

  <!-- App orchestration (registers screens, boots) -->
  <script src="js/app.js"></script>

  <!-- Hide splash once everything is ready -->
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) splash.classList.add('hidden');
        setTimeout(() => { if (splash) splash.remove(); }, 500);
      }, 600);
    });
  </script>

</body>
</html>
